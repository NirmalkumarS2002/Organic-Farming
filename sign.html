<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Farming Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Google Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #008f11, #00ff2a);
            padding: 20px;
        }

        .register-box {
            width: 420px;
            background: #eef2ee;
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 220px;
            height: auto;
            object-fit: contain;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .divider::before,
        .divider::after {
            content: "";
            width: 75px;
            height: 1px;
            background: #21b154;
        }

        .divider .material-symbols-outlined {
            color: #21b154;
            font-size: 20px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: #177a34;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-box {
            position: relative;
        }

        .input-box input,
        .input-box select {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            border: 1px solid #cfd4cf;
            background: #fff;
            outline: none;
            font-size: 13px;
            padding-left: 50px;
            padding-right: 15px;
            transition: .3s;
        }

        .input-box input:focus,
        .input-box select:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, .15);
        }

        .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #1fa34d;
            font-size: 16px;
        }

        .register-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #17a94d, #22c55e);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: .3s;
        }

        .register-btn:hover {
            transform: translateY(-3px);
        }

        .register-btn .material-symbols-outlined {
            vertical-align: middle;
            margin-right: 5px;
            font-size: 17px;
        }

        .error {
            display: block;
            color: #dc2626;
            font-size: 13px;
            margin-top: 5px;
        }

        .bottom-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 22px;
        }

        .bottom-divider::before,
        .bottom-divider::after {
            content: "";
            width: 75px;
            height: 1px;
            background: #21b154;
        }

        .bottom-divider .material-symbols-outlined {
            color: #21b154;
            font-size: 18px;
        }

        .bottom-text {
            text-align: center;
            margin-top: 15px;
            color: #6b7280;
            font-size: 14px;
        }

        .bottom-text a {
            text-decoration: none;
            color: #16a34a;
            font-weight: 600;
            font-size: 14px;

        }

        @media(max-width:480px) {
            .register-box {
                width: 100%;
                padding: 25px;
            }

            .logo img {
                width: 180px;
            }
        }

        .custom-select {
            position: relative;
            width: 100%;
        }

        .select-btn {
            height: 46px;
            background: #f5f5f5;
            border: 1px solid #cfe7d2;
            border-radius: 10px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: .3s;
        }

        .select-btn:hover {
            border-color: #16a34a;
               box-shadow: 0 0 0 4px rgba(34, 197, 94, .15);
        }

        .selected {
            color: #111827;
            font-size: 13px;
        }

        .arrow {
            color: #16a34a;
            transition: .3s;
        }

        .options {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            background: #f5f5f5;
            border: 1px solid #cfe7d2;
            border-radius: 10px;
            overflow: hidden;
            list-style: none;
            display: none;
            z-index: 100;
        }

        .options.active {
            display: block;
        }

        .options li {
            padding: 15px 18px;
            cursor: pointer;
            transition: .3s;
            font-size: 13px;
        }

        .options li:hover {
            background:  #16a34a;
        }

        .custom-select.open .arrow {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>

    <div class="register-box">

        <div class="logo">
            <img src="./src/logo.webp" alt="Logo">
        </div>

        <div class="divider">
            <span class="material-symbols-outlined">eco</span>
        </div>

        <p class="subtitle">
            Create your Organic Farming account and connect with farmers,
            managers and sustainable agriculture partners.
        </p>

        <form id="registerForm">

            <div class="form-group">
                <label>Select User Type</label>

                <div class="input-box">
                    <span class="material-symbols-outlined icon">agriculture</span>

                    <div class="custom-select">

                        <div class="select-btn">
                            <span class="selected">Select User Type</span>
                            <span class="material-symbols-outlined arrow">expand_more</span>
                        </div>

                        <ul class="options">
                            <li data-value="admin">Farm Admin</li>
                            <li data-value="client">Farmer</li>
                        </ul>

                        <input type="hidden" id="role">

                    </div>
                </div>

                <small class="error" id="roleError"></small>
            </div>

            <div class="form-group">
                <label>Full Name</label>

                <div class="input-box">
                    <span class="material-symbols-outlined icon">person</span>

                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <small class="error" id="nameError"></small>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>

                <div class="input-box">
                    <span class="material-symbols-outlined icon">call</span>

                    <input type="tel" id="mobile" maxlength="10" placeholder="Enter mobile number">
                </div>

                <small class="error" id="mobileError"></small>
            </div>

            <div class="form-group">
                <label>Email Address</label>

                <div class="input-box">
                    <span class="material-symbols-outlined icon">mail</span>

                    <input type="email" id="email" placeholder="Enter your email address">
                </div>

                <small class="error" id="emailError"></small>
            </div>

            <button type="submit" class="register-btn">
                <span class="material-symbols-outlined">eco</span>
                Create Account
            </button>

        </form>

        <div class="bottom-divider">
            <span class="material-symbols-outlined">eco</span>
        </div>

        <div class="bottom-text">
            Already have an account?
            <a href="login.html">Login Here</a>
        </div>

    </div>

    <script>

        const form = document.getElementById("registerForm");

        form.addEventListener("submit", function (e) {

            e.preventDefault();

            document.getElementById("roleError").innerText = "";
            document.getElementById("nameError").innerText = "";
            document.getElementById("mobileError").innerText = "";
            document.getElementById("emailError").innerText = "";

            let valid = true;

            const role = document.getElementById("role").value;
            const name = document.getElementById("name").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const email = document.getElementById("email").value.trim();

            if (role === "") {
                document.getElementById("roleError").innerText =
                    "Please select a user type";
                valid = false;
            }

            // Name Validation
            if (!/^[A-Za-z\s]{3,50}$/.test(name)) {
                document.getElementById("nameError").innerText =
                    "Name should contain only letters";
                valid = false;
            }

            // Mobile Validation
            if (!/^[0-9]{10}$/.test(mobile)) {
                document.getElementById("mobileError").innerText =
                    "Enter a valid 10 digit mobile number";
                valid = false;
            }

            // Email Validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(email)) {
                document.getElementById("emailError").innerText =
                    "Enter a valid email address";
                valid = false;
            }

            if (valid) {
                alert("Registration Successful");
                form.reset();
            }
        });

        // Name Field - Numbers & Special Characters Block
        document.getElementById("name").addEventListener("input", function () {
            this.value = this.value.replace(/[^A-Za-z\s]/g, "");
        });

        // Mobile Field - Only Numbers Allow
        document.getElementById("mobile").addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, "").slice(0, 10);
        });

        const customSelect = document.querySelector(".custom-select");
        const selectBtn = document.querySelector(".select-btn");
        const options = document.querySelector(".options");
        const selected = document.querySelector(".selected");
        const hiddenInput = document.querySelector("#role");

        selectBtn.addEventListener("click", () => {
            options.classList.toggle("active");
            customSelect.classList.toggle("open");
        });

        document.querySelectorAll(".options li").forEach(option => {
            option.addEventListener("click", () => {

                selected.textContent = option.textContent;
                hiddenInput.value = option.dataset.value;

                options.classList.remove("active");
                customSelect.classList.remove("open");
            });
        });

        document.addEventListener("click", (e) => {
            if (!customSelect.contains(e.target)) {
                options.classList.remove("active");
                customSelect.classList.remove("open");
            }
        });

    </script>

</body>

</html>
